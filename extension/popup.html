<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0f1219;
    color: #e4e7ed;
    width: 300px;
    min-height: 180px;
  }

  .header {
    background: #1a1f2e;
    border-bottom: 1px solid #2d3548;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 700;
    color: #10b981;
    letter-spacing: 1px;
  }

  .logo-sub {
    font-size: 9px;
    color: #4a5168;
    letter-spacing: 1px;
  }

  .body {
    padding: 16px;
  }

  .title-preview {
    font-size: 12px;
    font-weight: 600;
    color: #e4e7ed;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .meta {
    font-size: 11px;
    color: #8b92a5;
    margin-bottom: 16px;
  }

  .btn-save {
    width: 100%;
    background: #10b981;
    color: #0f1219;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.3px;
  }

  .btn-save:hover { background: #059669; }
  .btn-save:disabled { background: #2d3548; color: #4a5168; cursor: not-allowed; }

  .status {
    margin-top: 10px;
    font-size: 12px;
    text-align: center;
    min-height: 18px;
  }

  .status.success { color: #10b981; }
  .status.error   { color: #ef4444; }
  .status.loading { color: #8b92a5; }

  .settings {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid #2d3548;
  }

  .settings-label {
    font-size: 10px;
    font-weight: 700;
    color: #4a5168;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .settings-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .settings-input {
    flex: 1;
    background: #1a1f2e;
    border: 1px solid #2d3548;
    border-radius: 6px;
    padding: 6px 10px;
    color: #e4e7ed;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    outline: none;
  }

  .settings-input:focus { border-color: #10b981; }

  .btn-save-url {
    background: #1a1f2e;
    border: 1px solid #2d3548;
    border-radius: 6px;
    padding: 6px 10px;
    color: #8b92a5;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    cursor: pointer;
  }

  .btn-save-url:hover { border-color: #10b981; color: #10b981; }

  .not-claude {
    padding: 16px;
    text-align: center;
    color: #8b92a5;
    font-size: 12px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-icon"><img src="icon48.png" width="32" height="32" style="display:block;"></div>
  <div>
    <div class="logo-text">CAPSULE</div>
    <div class="logo-sub">LOCAL KNOWLEDGE OS</div>
  </div>
</div>

<div id="main"></div>

<script src="popup.js"></script>
</body>
</html>
