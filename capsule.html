<!DOCTYPE html>
<!--
  Capsule - Local Knowledge OS
  File: capsule.html
  Version: 1.0.0
  Date: 2026-03-05
  Changes: Initial rebuild - wired to FastAPI backend,
           semantic search, conversation import, entry viewer
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capsule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="/capsule-icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/capsule-icon-16.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:           #0f1219;
  --bg-panel:     #1a1f2e;
  --bg-card:      #1a1f2e;
  --bg-hover:     #252b3d;
  --border:       #2d3548;
  --border-light: #2d3548;
  --text:         #e4e7ed;
  --text-muted:   #8b92a5;
  --text-dim:     #4a5168;
  --accent:       #10b981;
  --accent-dim:   rgba(16,185,129,0.12);
  --accent-hover: #059669;
  --green:        #10b981;
  --green-dim:    rgba(16,185,129,0.1);
  --amber:        #f59e0b;
  --amber-dim:    rgba(245,158,11,0.1);
  --red:          #ef4444;
  --purple:       #8b5cf6;
  --purple-dim:   rgba(139,92,246,0.1);
  --mono:         'DM Sans', sans-serif;
  --sans:         'DM Sans', sans-serif;
  --radius:       8px;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  font-size: 13px;
}

/* ── LAYOUT ─────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 200px 320px 1fr;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}

/* ── HEADER ─────────────────────────────────── */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 0 1rem;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  gap: 1rem;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: var(--mono);
  font-weight: 500;
  font-size: 0.85rem;
  letter-spacing: 0.05em;
  color: var(--accent);
  flex-shrink: 0;
}

.logo-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 3s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.search-wrap {
  flex: 1;
  max-width: 480px;
  position: relative;
}

.search-icon {
  position: absolute;
  left: 0.75rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 0.8rem;
  pointer-events: none;
}

.search-box {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  padding: 0.45rem 0.75rem 0.45rem 2.2rem;
  color: var(--text);
  font-family: var(--sans);
  font-size: 0.8rem;
  outline: none;
  transition: border-color 0.15s;
}

.search-box:focus {
  border-color: var(--accent);
}

.search-box::placeholder { color: var(--text-dim); }

.search-mode {
  position: absolute;
  right: 0.5rem;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 0.15rem 0.4rem;
  border-radius: 3px;
  cursor: pointer;
  user-select: none;
}

.header-actions {
  display: flex;
  gap: 0.5rem;
  margin-left: auto;
  flex-shrink: 0;
}

/* ── SIDEBAR — PROJECTS ─────────────────────── */
.sidebar {
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-section {
  padding: 0.75rem 0.75rem 0.4rem;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--text-muted);
  text-transform: uppercase;
}

.project-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 0.4rem 0.5rem;
}

.project-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.45rem 0.6rem;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 0.8rem;
  transition: all 0.1s;
}

.project-item:hover { background: var(--bg-hover); color: var(--text); }
.project-item.active { background: var(--accent-dim); color: var(--accent); }

.project-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

.project-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.project-count { font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); }

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 0.4rem 0.75rem;
}

/* Source filters */
.source-filters {
  padding: 0 0.4rem 0.75rem;
}

.source-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.35rem 0.6rem;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 0.78rem;
  transition: all 0.1s;
}

.source-item:hover { background: var(--bg-hover); color: var(--text); }
.source-item.active { color: var(--text); }

.source-badge {
  font-family: var(--mono);
  font-size: 0.6rem;
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  margin-left: auto;
}

.badge-email  { background: var(--amber-dim);  color: var(--amber); }
.badge-claude { background: var(--purple-dim); color: var(--purple); }
.badge-chatgpt{ background: var(--green-dim);  color: var(--green); }
.badge-manual { background: var(--accent-dim); color: var(--accent); }
.badge-signal    { background: rgba(16,185,129,.15);  color: #10b981; }
.badge-perplexity{ background: rgba(99,102,241,.15);   color: #6366f1; }
.badge-ollama   { background: rgba(234,179,8,.15);    color: #ca8a04; }
.badge-all    { background: var(--bg-hover);   color: var(--text-muted); }

/* ── ENTRY LIST ─────────────────────────────── */
.entry-list-panel {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.list-header {
  padding: 0.75rem 1rem 0.6rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.list-title {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

.list-count {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
}

.entry-list {
  flex: 1;
  overflow-y: auto;
}

.entry-item {
  padding: 0.875rem 1rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}

.entry-item:hover { background: var(--bg-card); }
.entry-item.active { background: var(--bg-card); border-left: 2px solid var(--accent); }

.entry-item-header {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  margin-bottom: 0.3rem;
}

.entry-source-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-top: 3px;
  flex-shrink: 0;
}

.dot-email   { background: var(--amber); }
.dot-claude  { background: var(--purple); }
.dot-chatgpt { background: var(--green); }
.dot-manual  { background: var(--accent); }
.dot-signal     { background: #10b981; }
.dot-perplexity { background: #6366f1; }
.dot-ollama     { background: #ca8a04; }

.entry-title {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  flex: 1;
}

.entry-summary {
  font-size: 0.76rem;
  color: var(--text-muted);
  line-height: 1.4;
  margin-bottom: 0.4rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.entry-footer {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-wrap: wrap;
}

.tag-pill {
  font-family: var(--sans);
  font-size: 0.6rem;
  font-weight: 600;
  padding: 0.15rem 0.5rem;
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 20px;
}

.entry-date {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-left: auto;
}

.similarity-badge {
  font-family: var(--sans);
  font-size: 0.6rem;
  font-weight: 700;
  padding: 0.15rem 0.5rem;
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 20px;
}

/* ── ENTRY DETAIL ───────────────────────────── */
.detail-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.detail-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  gap: 0.75rem;
}

.detail-empty-icon {
  font-size: 2rem;
  opacity: 0.3;
}

.detail-empty-text {
  font-family: var(--mono);
  font-size: 0.75rem;
}

.detail-header {
  padding: 1.25rem 1.5rem 1rem;
  border-bottom: 1px solid var(--border);
}

.detail-title {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 0.75rem;
}

.detail-meta {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.meta-chip {
  font-family: var(--mono);
  font-size: 0.65rem;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

.chip-source-email   { background: var(--amber-dim);  color: var(--amber); }
.chip-source-claude  { background: var(--purple-dim); color: var(--purple); }
.chip-source-chatgpt { background: var(--green-dim);  color: var(--green); }
.chip-source-manual  { background: var(--accent-dim); color: var(--accent); }
.chip-source-signal     { background: rgba(16,185,129,.15);  color: #10b981; }
.chip-source-perplexity { background: rgba(99,102,241,.15);   color: #6366f1; }
.chip-source-ollama     { background: rgba(234,179,8,.15);    color: #ca8a04; }
.chip-date           { background: var(--bg-card); color: var(--text-muted); }
.chip-category       { background: var(--bg-card); color: var(--text-muted); }

.detail-tags {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  padding: 0.75rem 1.5rem;
  border-bottom: 1px solid var(--border);
}

.detail-tag {
  font-family: var(--mono);
  font-size: 0.65rem;
  padding: 0.2rem 0.5rem;
  background: var(--bg-hover);
  color: var(--text-muted);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.1s;
}

.detail-tag:hover { background: var(--accent-dim); color: var(--accent); }

.detail-summary {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
}

.detail-summary-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

.detail-summary-text {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.6;
}

.detail-content {
  flex: 1;
  overflow-y: auto;
  padding: 1.25rem 1.5rem;
}

.detail-content-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

.detail-content-text {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.7;
  white-space: pre-wrap;
  font-family: var(--sans);
}

/* ── BUTTONS ─────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.4rem 0.75rem;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  outline: none;
}

.btn-primary {
  background: var(--accent);
  color: var(--bg);
}
.btn-primary:hover { background: var(--accent-hover); }

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border-light);
}
.btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }

/* ── MODAL ───────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg-panel);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  padding: 1.5rem;
  width: 480px;
  max-width: 90vw;
  transform: translateY(8px);
  transition: transform 0.2s;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal-title {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 1.25rem;
  color: var(--text);
}

.form-group {
  margin-bottom: 1rem;
}

.form-label {
  display: block;
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}

.form-input,
.form-select,
.form-textarea {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  padding: 0.5rem 0.75rem;
  color: var(--text);
  font-family: var(--sans);
  font-size: 0.8rem;
  outline: none;
  transition: border-color 0.15s;
}

.form-input:focus,
.form-select:focus,
.form-textarea:focus { border-color: var(--accent); }

.form-textarea {
  resize: vertical;
  min-height: 100px;
  font-family: var(--mono);
  font-size: 0.75rem;
}

.form-select option { background: var(--bg-panel); }

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 0.5rem;
  margin-top: 1.25rem;
}

/* ── STATUS BAR ─────────────────────────────── */
.status-bar {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  background: var(--bg-panel);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  padding: 0.5rem 0.875rem;
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  z-index: 50;
  transition: all 0.3s;
  transform: translateY(calc(100% + 1rem));
}

.status-bar.visible { transform: translateY(0); }
.status-bar.success { color: var(--green); border-color: var(--green); }
.status-bar.error   { color: var(--red);   border-color: var(--red);   }

/* ── SCROLLBARS ─────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

/* ── LOADING ─────────────────────────────────── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.75rem;
}

.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border-light);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 0.5rem;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── STATUS BAR ── -->
<div class="status-bar" id="statusBar"></div>

<!-- ── IMPORT CONVERSATION MODAL ── -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-title">Import Conversation</div>
    <div class="form-group">
      <label class="form-label">Platform</label>
      <select class="form-select" id="importPlatform">
        <option value="claude">Claude</option>
        <option value="chatgpt">ChatGPT</option>
        <option value="manual">Manual / Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" class="form-input" id="importTitle" placeholder="Conversation title or topic">
    </div>
    <div class="form-group">
      <label class="form-label">Content (paste full conversation)</label>
      <textarea class="form-textarea" id="importContent" style="min-height:140px" placeholder="Paste conversation text here..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Deep Dive Project (optional)</label>
      <select class="form-select" id="importProject">
        <option value="">None</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Branch of (Conversation ID — optional)</label>
      <input type="number" class="form-input" id="importBranchOf" placeholder="Parent conversation ID">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('importModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitImport()">Import</button>
    </div>
  </div>
</div>

<!-- ── NEW PROJECT MODAL ── -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <div class="modal-title">New Deep Dive</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" class="form-input" id="projectName" placeholder="e.g. Local-First Architecture Research">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="projectDesc" placeholder="What is this deep dive about?"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('projectModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitProject()">Create</button>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <img src="/capsule-icon-32.png" alt="Capsule" style="width:32px;height:32px;border-radius:6px;object-fit:cover;flex-shrink:0;">
      <div style="display:flex;flex-direction:column;line-height:1.2;">
        <span style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;color:#10b981;">CAPSULE</span>
        <span style="font-family:'DM Sans',sans-serif;font-size:8px;letter-spacing:2px;color:#4a5168;">LOCAL KNOWLEDGE OS</span>
      </div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input
        type="text"
        class="search-box"
        id="searchBox"
        placeholder="Hybrid search — text + semantic..."
        oninput="handleSearch(this.value)"
      >
      


    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="openModal('importModal')">＋ Import</button>
      <button class="btn btn-primary" onclick="openModal('projectModal')">＋ Deep Dive</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">Deep Dives</div>
    <div class="project-list" id="projectList">
      <div class="project-item active" onclick="filterByProject(null, this)">
        <div class="project-dot"></div>
        <span class="project-name">All</span>
      </div>
    </div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-section">Sources</div>
    <div class="source-filters">
      <div class="source-item active" onclick="filterBySource(null, this)">
        <span>All entries</span>
        <span class="source-badge badge-all">all</span>
      </div>
      <div class="source-item" onclick="filterBySource('email', this)">
        <span>Email</span>
        <span class="source-badge badge-email">email</span>
      </div>
      <div class="source-item" onclick="filterBySource('claude', this)">
        <span>Claude</span>
        <span class="source-badge badge-claude">claude</span>
      </div>
      <div class="source-item" onclick="filterBySource('chatgpt', this)">
        <span>ChatGPT</span>
        <span class="source-badge badge-chatgpt">gpt</span>
      </div>
      <div class="source-item" onclick="filterBySource('signal', this)">
        <span>Signal</span>
        <span class="source-badge badge-signal">signal</span>
      </div>
      <div class="source-item" onclick="filterBySource('perplexity', this)">
        <span>Perplexity</span>
        <span class="source-badge badge-perplexity">perplexity</span>
      </div>
      <div class="source-item" onclick="filterBySource('ollama', this)">
        <span>Ollama</span>
        <span class="source-badge badge-ollama">ollama</span>
      </div>
      <div class="source-item" onclick="filterBySource('manual', this)">
        <span>Manual</span>
        <span class="source-badge badge-manual">manual</span>
      </div>
    </div>
  </aside>

  <!-- ENTRY LIST -->
  <section class="entry-list-panel">
    <div class="list-header">
      <span class="list-title" id="listTitle">ALL ENTRIES</span>
      <span class="list-count" id="listCount">—</span>
    </div>
    <div class="entry-list" id="entryList">
      <div class="loading"><div class="spinner"></div> Loading...</div>
    </div>
  </section>

  <!-- DETAIL PANEL -->
  <section class="detail-panel" id="detailPanel">
    <div class="detail-empty">
      <div class="detail-empty-icon">⬡</div>
      <div class="detail-empty-text">select an entry to read</div>
    </div>
  </section>

</div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const API = '';

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let state = {
  entries:       [],
  projects:      [],
  activeEntry:   null,
  activeProject: null,
  activeSource:  null,
  searchMode:    'semantic',  // semantic | text
  searchTimer:   null,
  displayLimit:  20,
  currentEntries: []
};

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
async function init() {
  await Promise.all([loadEntries(), loadProjects()]);
}

// ─────────────────────────────────────────────
// DATA LOADING
// ─────────────────────────────────────────────
async function loadEntries() {
  try {
    const res = await fetch(`${API}/entries?limit=500`);
    if (!res.ok) throw new Error('Failed to load entries');
    state.entries = await res.json();
    renderEntryList(state.entries);
  } catch (e) {
    showError('Cannot connect to Capsule backend. Is it running?');
    document.getElementById('entryList').innerHTML =
      `<div class="loading" style="color:var(--red)">Backend offline — start with: uvicorn main:app --reload</div>`;
  }
}

async function loadProjects() {
  try {
    const res = await fetch(`${API}/projects`);
    if (!res.ok) throw new Error('Failed to load projects');
    const projects = await res.json();
    renderProjects(projects);
  } catch(e) {
    renderProjects([]);
  }
}

const entryCache = {};

async function loadEntry(id) {
  if (entryCache[id]) return entryCache[id];
  try {
    const res = await fetch(`${API}/entries/${id}`);
    if (!res.ok) throw new Error('Entry not found');
    const entry = await res.json();
    entryCache[id] = entry;
    return entry;
  } catch(e) {
    showError('Could not load entry');
    return null;
  }
}

// ─────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────
function handleSearch(q) {
  clearTimeout(state.searchTimer);
  if (!q.trim()) {
    renderEntryList(state.entries);
    document.getElementById('listTitle').textContent = 'ALL ENTRIES';
    return;
  }
  state.searchTimer = setTimeout(() => {
    if (state.searchMode === 'semantic') {
      doSemanticSearch(q);
    } else {
      doTextSearch(q);
    }
  }, 400);
}

async function doSemanticSearch(q) {
  try {
    document.getElementById('listTitle').textContent = 'SEMANTIC SEARCH';
    document.getElementById('entryList').innerHTML =
      '<div class="loading"><div class="spinner"></div> Searching...</div>';
    const res = await fetch(`${API}/search/hybrid?q=${encodeURIComponent(q)}&limit=20`);
    if (!res.ok) throw new Error('Search failed');
    const results = await res.json();
    renderEntryList(results, true);
  } catch(e) {
    showError('Search failed');
  }
}

async function doTextSearch(q) {
  try {
    document.getElementById('listTitle').textContent = 'TEXT SEARCH';
    document.getElementById('entryList').innerHTML =
      '<div class="loading"><div class="spinner"></div> Searching...</div>';
    const res = await fetch(`${API}/search/text?q=${encodeURIComponent(q)}&limit=20`);
    if (!res.ok) throw new Error('Search failed');
    const results = await res.json();
    renderEntryList(results);
  } catch(e) {
    showError('Text search failed');
  }
}

function toggleSearchMode() {
  state.searchMode = state.searchMode === 'semantic' ? 'text' : 'semantic';
  document.getElementById('searchMode').textContent =
    state.searchMode === 'semantic' ? 'SEMANTIC' : 'TEXT';
  const q = document.getElementById('searchBox').value;
  if (q.trim()) handleSearch(q);
}

// ─────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────
function filterBySource(source, el) {
  document.querySelectorAll('.source-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  state.activeSource = source;
  applyFilters();
}

function filterByProject(projectId, el) {
  document.querySelectorAll('.project-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  state.activeProject = projectId;
  applyFilters();
}

function applyFilters() {
  let filtered = [...state.entries];
  if (state.activeSource) {
    filtered = filtered.filter(e => e.source === state.activeSource);
  }
  if (state.activeProject) {
    filtered = filtered.filter(e => e.project_id === state.activeProject);
  }
  renderEntryList(filtered);
}

// ─────────────────────────────────────────────
// RENDER — ENTRY LIST
// ─────────────────────────────────────────────
function renderEntryList(entries, showSimilarity = false) {
  const list = document.getElementById('entryList');
  document.getElementById('listCount').textContent = `${entries.length} entries`;

  if (!entries.length) {
    list.innerHTML = `<div class="loading" style="padding:3rem">No entries found</div>`;
    return;
  }

  // Store current entries for load more
  state.currentEntries = entries;
  state.displayLimit = state.displayLimit || 20;
  const visible = entries.slice(0, state.displayLimit);

  list.innerHTML = visible.map(e => `
    <div class="entry-item ${state.activeEntry === e.id ? 'active' : ''}"
         onclick="selectEntry(${e.id})">
      <div class="entry-item-header">
        <div class="entry-source-dot dot-${e.source || 'manual'}"></div>
        <div class="entry-title">${escHtml(e.title || 'Untitled')}</div>
      </div>
      ${e.summary ? `<div class="entry-summary">${escHtml(e.summary)}</div>` : ''}
      <div class="entry-footer">
        ${(e.tags || []).slice(0,3).map(t =>
          `<span class="tag-pill">#${escHtml(t)}</span>`
        ).join('')}
        ${showSimilarity && e.similarity !== undefined
          ? `<span class="similarity-badge">${Math.round(e.similarity * 100)}%</span>`
          : ''}
        <span class="entry-date">${formatDate(e.created_at)}</span>
      </div>
    </div>
  `).join('');

  if (entries.length > state.displayLimit) {
    list.innerHTML += `<div style="padding:0.75rem 1rem;text-align:center"><button class="btn btn-ghost" style="width:100%;font-size:0.75rem" onclick="loadMore()">Load more (${entries.length - state.displayLimit} remaining)</button></div>`;
  }
}

// ─────────────────────────────────────────────
// RENDER — ENTRY DETAIL
// ─────────────────────────────────────────────
async function selectEntry(id) {
  state.activeEntry = id;

  // Highlight in list
  document.querySelectorAll('.entry-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.entry-item').forEach(el => {
    if (el.onclick.toString().includes(`(${id})`)) el.classList.add('active');
  });

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = '<div class="loading" style="flex:1;height:100%"><div class="spinner"></div> Loading...</div>';

  const entry = await loadEntry(id);
  if (!entry) return;

  panel.innerHTML = `
    <div class="detail-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem">
        <div class="detail-title" style="margin-bottom:0">${escHtml(entry.title || 'Untitled')}</div>
        <button class="btn btn-ghost" style="flex-shrink:0;margin-left:1rem;color:var(--red);border-color:var(--red);opacity:0.7" onclick="deleteEntry(${entry.id})" title="Delete entry">✕ Delete</button>
        <button class="btn btn-ghost" style="color:var(--accent);border-color:var(--accent);opacity:0.8;margin-left:0.4rem" onclick="exportEntry(${entry.id})" title="Export as text">↓ Export</button>
      </div>
      <div class="detail-meta">
        <span class="meta-chip chip-source-${entry.source}">${entry.source || 'manual'}</span>
        ${entry.category ? `<span class="meta-chip chip-category">📁 ${escHtml(entry.category)}</span>` : ''}
        <span class="meta-chip chip-date">🕐 ${formatDate(entry.created_at)}</span>
      </div>
    </div>
    ${(entry.tags && entry.tags.length) ? `
    <div class="detail-tags">
      ${entry.tags.map(t => `<span class="detail-tag">#${escHtml(t)}</span>`).join('')}
    </div>` : ''}
    ${entry.summary ? `
    <div class="detail-summary">
      <div class="detail-summary-label">AI Summary</div>
      <div class="detail-summary-text">${escHtml(entry.summary)}</div>
    </div>` : ''}
    <div class="detail-content">
      <div class="detail-content-label">Content</div>
      <div class="detail-content-text">${escHtml(entry.raw_content || '')}</div>
    </div>
  `;
}

// ─────────────────────────────────────────────
// RENDER — PROJECTS SIDEBAR
// ─────────────────────────────────────────────
function renderProjects(projects) {
  state.projects = projects;
  const list = document.getElementById('projectList');
  const allItem = `
    <div class="project-item active" onclick="filterByProject(null, this)">
      <div class="project-dot"></div>
      <span class="project-name">All</span>
    </div>`;
  const projectItems = projects.map(p => `
    <div class="project-item" onclick="filterByProject(${p.id}, this)">
      <div class="project-dot"></div>
      <span class="project-name">${escHtml(p.name)}</span>
      <span class="project-count">${p.count || ''}</span>
    </div>
  `).join('');

  list.innerHTML = allItem + projectItems;

  // Also populate import modal select
  const sel = document.getElementById('importProject');
  sel.innerHTML = '<option value="">None</option>' +
    projects.map(p => `<option value="${p.id}">${escHtml(p.name)}</option>`).join('');
}

// ─────────────────────────────────────────────
// IMPORT CONVERSATION
// ─────────────────────────────────────────────
async function submitImport() {
  const platform  = document.getElementById('importPlatform').value;
  const title     = document.getElementById('importTitle').value.trim();
  const content   = document.getElementById('importContent').value.trim();
  const projectId = document.getElementById('importProject').value;
  const branchOf  = document.getElementById('importBranchOf').value;

  if (!content) { showError('Content is required'); return; }

  try {
    const res = await fetch(`${API}/import/conversation`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        platform,
        title: title || 'Imported Conversation',
        content,
        project_id: projectId ? parseInt(projectId) : null,
        branch_of:  branchOf  ? parseInt(branchOf)  : null
      })
    });

    if (!res.ok) throw new Error('Import failed');
    closeModal('importModal');
    showSuccess('Conversation imported and processed');
    await loadEntries();

    // Clear form
    document.getElementById('importTitle').value   = '';
    document.getElementById('importContent').value = '';
    document.getElementById('importBranchOf').value = '';

  } catch(e) {
    showError('Import failed — is the backend running?');
  }
}

// ─────────────────────────────────────────────
// NEW PROJECT
// ─────────────────────────────────────────────
async function submitProject() {
  const name = document.getElementById('projectName').value.trim();
  const desc = document.getElementById('projectDesc').value.trim();
  if (!name) { showError('Name is required'); return; }

  try {
    const res = await fetch(`${API}/projects`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description: desc })
    });
    if (!res.ok) throw new Error('Failed to create project');
    closeModal('projectModal');
    showSuccess(`Deep Dive "${name}" created`);
    document.getElementById('projectName').value = '';
    document.getElementById('projectDesc').value = '';
    await loadProjects();
  } catch(e) {
    showError('Could not create deep dive');
  }
}

// ─────────────────────────────────────────────
// EXPORT ENTRY
// ─────────────────────────────────────────────
function exportEntry(id) {
  const entry = entryCache[id];
  if (!entry) { showError('Open the entry first, then export'); return; }
  const title = (entry.title || 'entry').replace(/[^a-z0-9]/gi, '_').toLowerCase();
  const lines = [
    'CAPSULE EXPORT',
    'Title: ' + (entry.title || 'Untitled'),
    'Source: ' + (entry.source || ''),
    'Category: ' + (entry.category || ''),
    'Date: ' + (entry.created_at || ''),
    'Tags: ' + (entry.tags || []).join(', '),
    '',
    'SUMMARY',
    (entry.summary || 'No summary'),
    '',
    'CONTENT',
    (entry.raw_content || '')
  ].join('\n');
  const blob = new Blob([lines], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = title + '.txt';
  a.click();
  URL.revokeObjectURL(url);
  showSuccess('Exported');
}

// ─────────────────────────────────────────────
// LOAD MORE
// ─────────────────────────────────────────────
function loadMore() {
  state.displayLimit = (state.displayLimit || 20) + 20;
  renderEntryList(state.currentEntries || state.entries);
}

// ─────────────────────────────────────────────
// DELETE ENTRY
// ─────────────────────────────────────────────
async function deleteEntry(id) {
  if (!confirm('Delete this entry? This cannot be undone.')) return;
  try {
    const res = await fetch(`${API}/entries/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('Delete failed');
    showSuccess('Entry deleted');
    state.activeEntry = null;
    document.getElementById('detailPanel').innerHTML = `
      <div class="detail-empty">
        <div class="detail-empty-icon">⬡</div>
        <div class="detail-empty-text">select an entry to read</div>
      </div>`;
    await loadEntries();
  } catch(e) {
    showError('Could not delete entry');
  }
}

// ─────────────────────────────────────────────
// MODALS
// ─────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ─────────────────────────────────────────────
// STATUS MESSAGES
// ─────────────────────────────────────────────
let statusTimer;
function showStatus(msg, type = '') {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = `status-bar visible ${type}`;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => bar.classList.remove('visible'), 3500);
}

function showSuccess(msg) { showStatus('✓ ' + msg, 'success'); }
function showError(msg)   { showStatus('✗ ' + msg, 'error'); }

// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  if (diff < 604800000) {
    return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
}

// ─────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchBox').focus();
  }
});

// ─────────────────────────────────────────────
// START
// ─────────────────────────────────────────────
init();
</script>
</body>
</html>
